name: Docker CI/CD Workflow
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/alfredo-dashboard:latest .

    - name: Push Docker image to Docker Hub
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/alfredo-dashboard:latest

    - name: SSH into VPS and deploy
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_HOST }}
        username: juliano
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          sudo docker compose -f /root/alfredo_server/compose.yaml down
          sudo docker compose -f /root/alfredo_server/compose.yaml pull
          sudo docker compose -f /root/alfredo_server/compose.yaml up -d
          sudo docker image prune -f
